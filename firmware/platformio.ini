; Waveshare ESP32-S3-Touch-AMOLED-1.8 — real-time voice assistant
[env:waveshare-esp32-s3-touch-amoled-1_8]
platform = espressif32
board = esp32-s3-devkitc1-n16r8
framework = arduino
monitor_speed = 115200
monitor_filters = time
upload_speed = 1500000
upload_port = /dev/cu.usbmodem101
monitor_port = /dev/cu.usbmodem101

board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
; ESP32-S3R8 has octal PSRAM and external QIO flash.
board_build.arduino.memory_type = qio_opi

lib_deps =
    moononournation/GFX Library for Arduino@^1.6.5
    lewisxhe/XPowersLib@^0.3.3
    bblanchon/ArduinoJson@^7.0.0
    gilmaimon/ArduinoWebsockets@^0.5.4

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DXPOWERS_CHIP_AXP2101
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
